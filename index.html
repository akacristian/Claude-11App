/* =========================================================================
   STATE  (persisted to localStorage)
   ========================================================================= */
const SAVE_KEY = 'eb-trainer-v1';
const state = loadState();
function defaultState(){
  return { xp:0, streak:0, bestStreak:0, known:{}, // known: id->true
    stats:{ flashSeen:0, quizCorrect:0, quizTotal:0, guardCorrect:0, guardTotal:0 },
    muted:false };
}
function loadState(){
  try { const s = JSON.parse(localStorage.getItem(SAVE_KEY)); if(s && typeof s==='object') return Object.assign(defaultState(), s, {stats:Object.assign(defaultState().stats, s.stats||{})}); }
  catch(e){}
  return defaultState();
}
function save(){ try{ localStorage.setItem(SAVE_KEY, JSON.stringify(state)); }catch(e){} }

/* leveling: each level needs level*100 XP cumulative-ish — simple curve */
function levelInfo(xp){
  let lvl=1, need=100, acc=0;
  while(xp >= acc+need){ acc+=need; lvl++; need=100+(lvl-1)*40; }
  return { lvl, into: xp-acc, need, pct: Math.round(((xp-acc)/need)*100) };
}
function addXP(n){
  state.xp = Math.max(0, state.xp + n);
  save(); renderHUD();
}
function bumpStreak(ok){
  if(ok){ state.streak++; state.bestStreak=Math.max(state.bestStreak,state.streak); }
  else { state.streak=0; }
  save(); renderHUD();
}

/* =========================================================================
   SOUND (WebAudio blips) + visual flash
   ========================================================================= */
let actx=null;
function beep(type){
  if(state.muted) return;
  try{
    actx = actx || new (window.AudioContext||window.webkitAudioContext)();
    const seq = type==='good' ? [[660,0],[880,0.09]] : type==='bad' ? [[200,0],[150,0.12]] : [[520,0]];
    seq.forEach(([f,t])=>{
      const o=actx.createOscillator(), g=actx.createGain();
      o.type = type==='bad' ? 'sawtooth':'sine'; o.frequency.value=f;
      o.connect(g); g.connect(actx.destination);
      const start=actx.currentTime+t;
      g.gain.setValueAtTime(0.0001,start);
      g.gain.exponentialRampToValueAtTime(0.18,start+0.02);
      g.gain.exponentialRampToValueAtTime(0.0001,start+0.18);
      o.start(start); o.stop(start+0.2);
    });
  }catch(e){}
}
function flash(kind){
  const el=document.getElementById('flash');
  el.className = 'pointer-events-none fixed inset-0 z-50 animate-flash ' + (kind==='good'?'bg-emerald-400':'bg-rose-500');
  el.style.display='block';
  setTimeout(()=>{ el.style.display='none'; el.className='pointer-events-none fixed inset-0 z-50 hidden'; }, 480);
}
function feedback(ok){ beep(ok?'good':'bad'); flash(ok?'good':'bad'); }

/* =========================================================================
   HUD
   ========================================================================= */
function renderHUD(){
  const li = levelInfo(state.xp);
  document.getElementById('hud-xp').textContent = state.xp;
  document.getElementById('hud-streak').textContent = state.streak;
  document.getElementById('hud-level').textContent = 'Lv '+li.lvl;
  document.getElementById('hud-bar').style.width = li.pct+'%';
  document.getElementById('hud-next').textContent = li.into+'/'+li.need;
  document.getElementById('btn-mute').textContent = state.muted ? '🔇' : '🔊';
}

/* =========================================================================
   TABS
   ========================================================================= */
const TAB_RENDER = {};
function showTab(name){
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.add('hidden'));
  document.getElementById('tab-'+name).classList.remove('hidden');
  document.querySelectorAll('.tab-btn').forEach(b=>{
    const on = b.dataset.tab===name;
    b.classList.toggle('border-emerald-500', on);
    b.classList.toggle('text-slate-900', on);
    b.classList.toggle('text-slate-500', !on);
    b.classList.toggle('border-transparent', !on);
  });
  if(TAB_RENDER[name]) TAB_RENDER[name]();
  window.scrollTo({top:0, behavior:'smooth'});
}
document.querySelectorAll('.tab-btn').forEach(b=> b.addEventListener('click', ()=>showTab(b.dataset.tab)));
document.getElementById('btn-mute').addEventListener('click', ()=>{ state.muted=!state.muted; save(); renderHUD(); });

}
function modeCard(go,icon,title,desc,color){
  return `<button data-go="${go}" class="w-full text-left rounded-2xl bg-white p-4 shadow-sm border border-slate-100 flex gap-4 items-start active:scale-[.99] transition hover:border-${color}-300">
    <div class="text-3xl">${icon}</div>
    <div class="min-w-0"><div class="font-bold text-slate-900">${title}</div><div class="text-sm text-slate-500">${desc}</div></div>
    <div class="ml-auto self-center text-slate-300 text-xl">›</div></button>`;
}

/* =========================================================================
   FLASHCARDS
   ========================================================================= */
const flashState = { order:[], idx:0, filter:'all' };
function buildFlashOrder(){
  let list = DISHES.map(d=>d.id);
  if(flashState.filter!=='all') list = DISHES.filter(d=>d.sec===flashState.filter).map(d=>d.id);
  flashState.order = list; flashState.idx = 0;
}
TAB_RENDER.flash = function(){
  if(!flashState.order.length) buildFlashOrder();
  const el=document.getElementById('tab-flash');
  const secs = ['all', ...Object.keys(SECTIONS)];
  el.innerHTML = `
    <div class="flex items-center gap-2 flex-wrap">
      <select id="flash-filter" class="text-sm rounded-lg border-slate-200 border px-2 py-1.5 bg-white">
        ${secs.map(s=>`<option value="${s}" ${s===flashState.filter?'selected':''}>${s==='all'?'All sections':s}</option>`).join('')}
      </select>
      <button id="flash-shuffle" class="text-sm px-3 py-1.5 rounded-lg bg-slate-200 font-semibold">🔀 Shuffle</button>
      <span id="flash-count" class="ml-auto text-sm text-slate-500 tabular-nums"></span>
    </div>
    <div id="flash-card-wrap" class="mt-4"></div>
    <div class="flex items-center gap-2 mt-4">
      <button id="flash-prev" class="flex-1 py-3 rounded-xl bg-white border border-slate-200 font-semibold active:scale-95">‹ Prev</button>
      <button id="flash-known" class="flex-1 py-3 rounded-xl bg-emerald-500 text-white font-semibold active:scale-95">✓ Mastered</button>
      <button id="flash-next" class="flex-1 py-3 rounded-xl bg-white border border-slate-200 font-semibold active:scale-95">Next ›</button>
    </div>`;
  el.querySelector('#flash-filter').addEventListener('change', e=>{ flashState.filter=e.target.value; buildFlashOrder(); TAB_RENDER.flash(); });
  el.querySelector('#flash-shuffle').addEventListener('click', ()=>{ shuffle(flashState.order); flashState.idx=0; renderFlashCard(); });
  el.querySelector('#flash-prev').addEventListener('click', ()=>{ flashState.idx=(flashState.idx-1+flashState.order.length)%flashState.order.length; renderFlashCard(); });
  el.querySelector('#flash-next').addEventListener('click', ()=>{ flashState.idx=(flashState.idx+1)%flashState.order.length; renderFlashCard(); });
  el.querySelector('#flash-known').addEventListener('click', ()=>{
    const d = currentFlash(); if(!d) return;
    if(!state.known[d.id]){ state.known[d.id]=true; addXP(5); }
    save(); flashState.idx=(flashState.idx+1)%flashState.order.length; renderFlashCard();
  });
  renderFlashCard();
};
function currentFlash(){ const id=flashState.order[flashState.idx]; return DISHES.find(d=>d.id===id); }
function renderFlashCard(){
  const d=currentFlash(); if(!d) return;
  document.getElementById('flash-count').textContent = (flashState.idx+1)+' / '+flashState.order.length;
  const flagsHtml = flagPills(d);
  const wrap=document.getElementById('flash-card-wrap');
  wrap.innerHTML = `
    <div class="card-3d animate-pop">
      <div id="card-inner" class="card-inner relative w-full" style="min-height:22rem">
        <!-- FRONT -->
        <div class="card-face absolute inset-0 rounded-2xl bg-white shadow-lg border border-slate-100 p-6 flex flex-col">
          <div class="flex items-center gap-2">
            <span class="text-xs font-bold px-2 py-0.5 rounded-full ${secChip(d.sec)}">${SECTIONS[d.sec].emoji} ${d.sec}</span>
            ${state.known[d.id]?'<span class="text-xs font-bold text-emerald-600 ml-auto">✓ Mastered</span>':''}
          </div>
          <div class="flex-1 grid place-items-center text-center px-2">
            <div>
              <div class="text-2xl font-extrabold text-slate-900 leading-snug">${d.name}</div>
              <div class="mt-3 text-sm text-slate-400">Tap to reveal the notes</div>
            </div>
          </div>
          <div class="flex flex-wrap gap-1 justify-center">${flagsHtml}</div>
        </div>
        <!-- BACK -->
        <div class="card-face card-back absolute inset-0 rounded-2xl bg-white shadow-lg border border-slate-100 p-5 overflow-y-auto">
          <div class="text-lg font-extrabold text-slate-900 mb-2">${d.name}</div>
          ${field('Table description', d.desc)}
          ${field('Process', d.process)}
          ${field('Allergies & replacements', d.allergies, 'rose')}
          ${field('Mise en place', d.mise, 'slate')}
          <div class="flex flex-wrap gap-1 mt-3">${flagsHtml}</div>
        </div>
      </div>
    </div>`;
  const inner = wrap.querySelector('#card-inner');
  inner.addEventListener('click', ()=>{
    inner.classList.toggle('flipped');
    if(inner.classList.contains('flipped')){ beep('flip'); state.stats.flashSeen++; save(); }
  });
}
function field(label, val, color){
  if(!val || val==='—') return '';
  const c = color==='rose' ? 'text-rose-600' : color==='slate' ? 'text-slate-400' : 'text-emerald-600';
  return `<div class="mb-2"><div class="text-[11px] font-bold uppercase tracking-wide ${c}">${label}</div><div class="text-sm text-slate-700 leading-snug">${val}</div></div>`;
}
function flagPills(d){
  const out=[];
  for(const a of ALLERGENS){
    const v = d.flags[a.key];
    if(!v) continue;
    const cls = v==='yes' ? 'bg-rose-100 text-rose-700' : 'bg-amber-100 text-amber-700';
    const suffix = v==='mod' ? ' · can modify' : '';
    out.push(`<span class="text-[11px] px-2 py-0.5 rounded-full ${cls}">${a.icon} ${a.label}${suffix}</span>`);
  }
  if(!out.length) out.push('<span class="text-[11px] px-2 py-0.5 rounded-full bg-emerald-100 text-emerald-700">✓ no flagged allergens</span>');
  return out.join('');
}

/* =========================================================================
   QUIZ  (Table Descriptions / Ingredients / Allergies)
   ========================================================================= */
const quizState = { q:null, answered:false, sessionCorrect:0, sessionTotal:0 };
TAB_RENDER.quiz = function(){
  const el=document.getElementById('tab-quiz');
  el.innerHTML = `
    <div class="flex items-center gap-2">
      <div class="text-sm text-slate-500">Session: <span id="q-score" class="font-bold text-slate-800"></span></div>
      <button id="q-skip" class="ml-auto text-sm px-3 py-1.5 rounded-lg bg-slate-200 font-semibold">Skip ↻</button>
    </div>
    <div id="q-body" class="mt-3"></div>`;
  el.querySelector('#q-skip').addEventListener('click', ()=> nextQuiz());
  if(!quizState.q) nextQuiz(); else renderQuiz();
  updateQScore();
};
function updateQScore(){ const e=document.getElementById('q-score'); if(e) e.textContent = quizState.sessionCorrect+' / '+quizState.sessionTotal; }
function nextQuiz(){ quizState.q = makeQuestion(); quizState.answered=false; renderQuiz(); }
function makeQuestion(){
  const types=['desc','ingredient','allergy-flag','safe'];
  const type = types[Math.floor(Math.random()*types.length)];
  if(type==='desc'){
    const d = rand(DISHES);
    const opts = pickDistinct(DISHES, 3, x=>x.id!==d.id && x.sec? true:true).map(x=>x.name);
    opts.push(d.name); shuffle(opts);
    return { type, prompt:`Which dish matches this table-side description?`, sub:`“${d.desc}”`, options:opts, answer:d.name, tag:'Table Description', explain:`${d.name} — ${d.sec}.` };
  }
  if(type==='ingredient'){
    const d = rand(DISHES.filter(x=>x.process && x.process.length>40));
    const snippet = d.process.length>180 ? d.process.slice(0,180)+'…' : d.process;
    const opts = pickDistinct(DISHES, 3, x=>x.id!==d.id).map(x=>x.name);
    opts.push(d.name); shuffle(opts);
    return { type, prompt:`Which dish is prepared like this?`, sub:`“${snippet}”`, options:opts, answer:d.name, tag:'Ingredients / Process', explain:`${d.name}.` };
  }
  if(type==='allergy-flag'){
    // dish that contains at least one allergen ('yes' or 'mod')
    const cands = DISHES.filter(x=>Object.values(x.flags).some(v=>v==='yes'));
    const d = rand(cands);
    const present = Object.keys(d.flags).filter(k=>d.flags[k]==='yes');
    const correctKey = rand(present);
    const absent = ALLERGENS.map(a=>a.key).filter(k=>!d.flags[k]);
    const distract = pickDistinct(absent, 3, ()=>true);
    const opts = distract.map(k=>ALLERGEN_LABEL[k]); opts.push(ALLERGEN_LABEL[correctKey]); shuffle(opts);
    return { type, prompt:`A guest asks about “${d.name}”. Which allergen must you flag (cannot be removed)?`, sub:'', options:opts, answer:ALLERGEN_LABEL[correctKey], tag:'Allergies', explain:`${d.name}: ${d.allergies}` };
  }
  // safe-to-serve
  const profile = rand(PROFILES);
  const d = rand(DISHES);
  const st = statusFor(d, profile.keys);
  const map = { safe:'Safe to serve as is', mod:'Safe only with a modification', unsafe:'Cannot be served' };
  const opts = ['Safe to serve as is','Safe only with a modification','Cannot be served']; shuffle(opts);
  return { type:'safe', prompt:`Guest profile: ${profile.icon} ${profile.name}. Can you serve “${d.name}”?`, sub:'', options:opts, answer:map[st], tag:'Allergies', explain:`${d.name}: ${d.allergies}` };
}
function renderQuiz(){
  const q=quizState.q, body=document.getElementById('q-body'); if(!q||!body) return;
  body.innerHTML = `
    <div class="rounded-2xl bg-white shadow-sm border border-slate-100 p-5 animate-pop">
      <span class="text-[11px] font-bold uppercase tracking-wide text-sky-600">${q.tag}</span>
      <h3 class="font-bold text-slate-900 mt-1 leading-snug">${q.prompt}</h3>
      ${q.sub?`<p class="text-sm text-slate-500 italic mt-2 border-l-2 border-slate-200 pl-3">${q.sub}</p>`:''}
      <div id="q-opts" class="mt-4 space-y-2"></div>
      <div id="q-exp" class="mt-3 hidden text-sm rounded-xl p-3"></div>
      <button id="q-cont" class="hidden mt-3 w-full py-3 rounded-xl bg-slate-900 text-white font-semibold">Continue ›</button>
    </div>`;
  const optsBox = body.querySelector('#q-opts');
  q.options.forEach(opt=>{
    const b=document.createElement('button');
    b.className='w-full text-left px-4 py-3 rounded-xl border border-slate-200 bg-white font-medium active:scale-[.99] transition hover:border-sky-300';
    b.textContent=opt;
    b.addEventListener('click', ()=> answerQuiz(opt, b));
    optsBox.appendChild(b);
  });
  body.querySelector('#q-cont').addEventListener('click', ()=>{ nextQuiz(); updateQScore(); });
}
function answerQuiz(opt, btn){
  if(quizState.answered) return;
  quizState.answered=true;
  const q=quizState.q;
  const ok = opt===q.answer;
  quizState.sessionTotal++; state.stats.quizTotal++;
  if(ok){ quizState.sessionCorrect++; state.stats.quizCorrect++; addXP(10); bumpStreak(true); }
  else { bumpStreak(false); }
  save(); feedback(ok);
  document.querySelectorAll('#q-opts button').forEach(b=>{
    b.disabled=true;
    if(b.textContent===q.answer){ b.className='w-full text-left px-4 py-3 rounded-xl border-2 border-emerald-500 bg-emerald-50 font-semibold'; }
    else if(b===btn){ b.className='w-full text-left px-4 py-3 rounded-xl border-2 border-rose-500 bg-rose-50 font-semibold animate-shake'; }
    else { b.className='w-full text-left px-4 py-3 rounded-xl border border-slate-200 bg-white text-slate-400'; }
  });
  const exp=document.getElementById('q-exp');
  exp.className = 'mt-3 text-sm rounded-xl p-3 '+(ok?'bg-emerald-50 text-emerald-800':'bg-rose-50 text-rose-800');
  exp.innerHTML = (ok?'✅ <b>Correct!</b> ':'❌ <b>Not quite.</b> Answer: <b>'+q.answer+'</b>. ')+'<br><span class="text-slate-600">'+q.explain+'</span>';
  exp.classList.remove('hidden');
  document.getElementById('q-cont').classList.remove('hidden');
  updateQScore();
}

/* =========================================================================
   ALLERGY SAFE GUARD
   ========================================================================= */
function statusFor(dish, keys){
  let mod=false;
  for(const k of keys){
    if(dish.flags[k]==='yes') return 'unsafe';
    if(dish.flags[k]==='mod') mod=true;
  }
  return mod ? 'mod' : 'safe';
}
const guardState = { round:null, answered:false };
TAB_RENDER.guard = function(){
  const el=document.getElementById('tab-guard');
  el.innerHTML = `<div id="guard-body"></div>`;
  if(!guardState.round) nextGuard(); else renderGuard();
};
function nextGuard(){
  const profile = rand(PROFILES);
  const guest = rand(GUEST_NAMES);
  const dish = rand(DISHES);
  const status = statusFor(dish, profile.keys);
  guardState.round = { profile, guest, dish, status };
  guardState.answered=false;
  renderGuard();
}
function renderGuard(){
  const r=guardState.round, body=document.getElementById('guard-body'); if(!r||!body) return;
  const acc = state.stats.guardTotal ? Math.round(100*state.stats.guardCorrect/state.stats.guardTotal) : 0;
  body.innerHTML = `
    <div class="flex items-center text-sm text-slate-500">
      <span>Correct calls: <b class="text-slate-800">${state.stats.guardCorrect}/${state.stats.guardTotal}</b> · ${acc}%</span>
      <span class="ml-auto">🔥 ${state.streak}</span>
    </div>

    <div class="mt-3 rounded-2xl bg-gradient-to-br from-rose-500 to-orange-500 text-white p-4 shadow-lg animate-pop">
      <div class="flex items-center gap-3">
        <div class="text-3xl">${r.profile.icon}</div>
        <div>
          <div class="text-xs uppercase tracking-wide text-white/80">Guest at the pass</div>
          <div class="font-bold text-lg leading-tight">${r.guest}</div>
          <div class="text-sm">Allergy / requirement: <b>${r.profile.name}</b></div>
        </div>
      </div>
    </div>

    <div class="mt-3 rounded-2xl bg-white shadow-sm border border-slate-100 p-5">
      <span class="text-xs font-bold px-2 py-0.5 rounded-full ${secChip(r.dish.sec)}">${SECTIONS[r.dish.sec].emoji} ${r.dish.sec}</span>
      <h3 class="text-xl font-extrabold text-slate-900 mt-2 leading-snug">${r.dish.name}</h3>
      <p class="text-sm text-slate-500 mt-1">${r.dish.desc}</p>
      <div class="flex flex-wrap gap-1 mt-3">${flagPills(r.dish)}</div>
    </div>

    <div id="guard-actions" class="grid grid-cols-2 gap-3 mt-4">
      <button data-act="approve" class="py-4 rounded-2xl bg-emerald-500 text-white font-bold text-lg active:scale-95 shadow">✓ Approve</button>
      <button data-act="reject" class="py-4 rounded-2xl bg-rose-500 text-white font-bold text-lg active:scale-95 shadow">✕ Reject</button>
    </div>
    <div id="guard-result" class="mt-4 hidden"></div>`;

  body.querySelectorAll('#guard-actions button').forEach(b=> b.addEventListener('click', ()=> answerGuard(b.dataset.act)));
}
function answerGuard(act){
  if(guardState.answered) return;
  guardState.answered=true;
  const r=guardState.round;
  // correct: unsafe => reject ; safe/mod => approve
  const shouldApprove = r.status!=='unsafe';
  const ok = (act==='approve') === shouldApprove;
  state.stats.guardTotal++;
  if(ok){ state.stats.guardCorrect++; addXP(12); bumpStreak(true); } else { bumpStreak(false); }
  save(); feedback(ok);

  // which keys triggered
  const triggers = r.profile.keys.filter(k=>r.dish.flags[k]);
  const trigTxt = triggers.map(k=>{
    const v=r.dish.flags[k]; return ALLERGEN_LABEL[k]+(v==='mod'?' (modifiable)':' (cannot remove)');
  }).join(', ') || 'none of the guest’s restrictions are present';

  const verdict = r.status==='unsafe' ? 'REJECT — cannot be served safely'
               : r.status==='mod' ? 'APPROVE with a modification'
               : 'APPROVE — safe as is';

  document.querySelectorAll('#guard-actions button').forEach(b=> b.disabled=true);
  const res=document.getElementById('guard-result');
  res.className = 'mt-4 rounded-2xl p-4 '+(ok?'bg-emerald-50 border border-emerald-200':'bg-rose-50 border border-rose-200');
  res.innerHTML = `
    <div class="font-bold ${ok?'text-emerald-700':'text-rose-700'}">${ok?'✅ Correct call!':'❌ Wrong call.'}</div>
    <div class="text-sm mt-1 text-slate-700">Right answer: <b>${verdict}</b></div>
    <div class="text-sm mt-2 text-slate-600"><b>Why:</b> ${trigTxt}.</div>
    <div class="text-sm mt-2 text-slate-600 border-t border-slate-200/70 pt-2"><b>Notes:</b> ${r.dish.allergies}</div>
    <button id="guard-next" class="mt-3 w-full py-3 rounded-xl bg-slate-900 text-white font-semibold">Next guest ›</button>`;
  res.classList.remove('hidden');
  res.querySelector('#guard-next').addEventListener('click', ()=> nextGuard());
}

   MENU BROWSER
   ========================================================================= */
const browserState = { q:'', sec:'all', open:{} };
TAB_RENDER.browser = function(){
  const el=document.getElementById('tab-browser');
  const secs=['all', ...Object.keys(SECTIONS)];
  el.innerHTML = `
    <div class="sticky top-[140px] z-20 bg-slate-100 pb-2 -mx-1 px-1">
      <input id="b-search" value="${browserState.q}" placeholder="Search dishes, ingredients, allergens…" class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-white shadow-sm" />
      <div class="flex gap-1.5 mt-2 overflow-x-auto no-scrollbar">
        ${secs.map(s=>`<button data-sec="${s}" class="bsec px-3 py-1.5 rounded-full text-xs font-semibold whitespace-nowrap ${s===browserState.sec?'bg-slate-900 text-white':'bg-white border border-slate-200 text-slate-600'}">${s==='all'?'All':SECTIONS[s].emoji+' '+s}</button>`).join('')}
      </div>
    </div>
    <div id="b-list" class="mt-3 space-y-2"></div>`;
  const search=el.querySelector('#b-search');
  search.addEventListener('input', e=>{ browserState.q=e.target.value; renderBrowserList(); });
  el.querySelectorAll('.bsec').forEach(b=> b.addEventListener('click', ()=>{ browserState.sec=b.dataset.sec; TAB_RENDER.browser(); }));
  renderBrowserList();
  // keep focus if typing
  if(browserState.q){ const s=el.querySelector('#b-search'); s.focus(); s.setSelectionRange(s.value.length,s.value.length); }
};
function renderBrowserList(){
  const list=document.getElementById('b-list'); if(!list) return;
  const q=browserState.q.trim().toLowerCase();
  let items=DISHES.filter(d=> browserState.sec==='all' || d.sec===browserState.sec);
  if(q){
    items=items.filter(d=>{
      const hay=(d.name+' '+d.desc+' '+d.process+' '+d.allergies+' '+Object.keys(d.flags).map(k=>ALLERGEN_LABEL[k]).join(' ')).toLowerCase();
      return hay.includes(q);
    });
  }
  if(!items.length){ list.innerHTML='<div class="text-center text-slate-400 py-10">No dishes match “'+browserState.q+'”.</div>'; return; }
  // group by section
  const groups={};
  items.forEach(d=> (groups[d.sec]=groups[d.sec]||[]).push(d));
  list.innerHTML = Object.keys(SECTIONS).filter(s=>groups[s]).map(sec=>{
    return `<div class="pt-1">
      <div class="flex items-center gap-2 px-1 py-1">
        <span class="w-1.5 h-5 rounded-full ${secBar(sec)}"></span>
        <h3 class="font-bold text-slate-700">${SECTIONS[sec].emoji} ${sec}</h3>
        <span class="text-xs text-slate-400">${groups[sec].length}</span>
      </div>
      ${groups[sec].map(d=>browserRow(d)).join('')}
    </div>`;
  }).join('');
  list.querySelectorAll('[data-row]').forEach(r=> r.addEventListener('click', ()=>{
    const id=+r.dataset.row; browserState.open[id]=!browserState.open[id]; renderBrowserList();
  }));
}
function browserRow(d){
  const open=browserState.open[d.id];
  return `<div class="rounded-xl bg-white border border-slate-100 shadow-sm mb-2 overflow-hidden">
    <button data-row="${d.id}" class="w-full text-left px-4 py-3 flex items-center gap-3">
      <div class="min-w-0 flex-1">
        <div class="font-semibold text-slate-900 leading-snug">${d.name}</div>
        <div class="text-xs text-slate-500 truncate">${d.desc}</div>
      </div>
      <div class="text-slate-300 text-lg shrink-0">${open?'▲':'▼'}</div>
    </button>
    ${open?`<div class="px-4 pb-4 pt-1 border-t border-slate-100">
      ${field('Table description', d.desc)}
      ${field('Process', d.process)}
      ${field('Allergies & replacements', d.allergies, 'rose')}
      ${field('Mise en place', d.mise, 'slate')}
      <div class="flex flex-wrap gap-1 mt-2">${flagPills(d)}</div>
    </div>`:''}
  </div>`;
}

/* =========================================================================
   UTIL
   ========================================================================= */
function rand(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function pickDistinct(pool, n, pred){
  const cand = shuffle(pool.filter(pred)).slice();
  const out=[]; const seen=new Set();
  for(const x of cand){ const key = (typeof x==='string')?x:x.name; if(seen.has(key)) continue; seen.add(key); out.push(x); if(out.length>=n) break; }
  return out;
}
